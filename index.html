            }
        }

        /**
         * 下载图片，去除背景并裁剪到内容边缘
         */
        async function downloadImage(url, modelName) {
            try {
                // 创建图片对象
                const img = new Image();
                img.crossOrigin = 'anonymous';

                await new Promise((resolve, reject) => {
                    img.onload = resolve;
                    img.onerror = reject;
                    img.src = url;
                });

                // 创建 Canvas
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;

                // 绘制图片
                ctx.drawImage(img, 0, 0);

                // 获取图片数据
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;

                // 检测内容边界（去除白色/浅色背景）
                let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;
                let hasContent = false;

                // 遍历像素，找到内容边界
                for (let y = 0; y < canvas.height; y++) {
                    for (let x = 0; x < canvas.width; x++) {
                        const idx = (y * canvas.width + x) * 4;
                        const r = data[idx];
                        const g = data[idx + 1];
                        const b = data[idx + 2];
                        const a = data[idx + 3];

                        // 检测非背景像素（不是纯白或接近白色，且不透明）
                        // 白色背景通常是 RGB(240,240,240) 以上或接近透明
                        const isBackground = (r > 240 && g > 240 && b > 240) || a < 10;

                        if (!isBackground) {
                            hasContent = true;
                            minX = Math.min(minX, x);
                            minY = Math.min(minY, y);
                            maxX = Math.max(maxX, x);
                            maxY = Math.max(maxY, y);
                        }
                    }
                }

                // 如果找到内容，裁剪到边界；否则使用原图
                let finalCanvas = canvas;
                if (hasContent && (minX < maxX && minY < maxY)) {
                    const width = maxX - minX + 1;
                    const height = maxY - minY + 1;

                    // 创建新 Canvas，只包含内容区域
                    finalCanvas = document.createElement('canvas');
                    finalCanvas.width = width;
                    finalCanvas.height = height;
                    const finalCtx = finalCanvas.getContext('2d');

                    // 绘制裁剪后的内容（带透明背景）
                    finalCtx.drawImage(
                        canvas,
                        minX, minY, width, height,
                        0, 0, width, height
                    );
                } else {
                    // 如果没有检测到边界，创建透明背景版本
                    finalCanvas = document.createElement('canvas');
                    finalCanvas.width = canvas.width;
                    finalCanvas.height = canvas.height;
                    const finalCtx = finalCanvas.getContext('2d');

                    // 绘制原图
                    finalCtx.drawImage(img, 0, 0);
                }

                // 转换为 Blob 并下载
                finalCanvas.toBlob((blob) => {
                    if (!blob) {
                        throw new Error('无法创建图片');
                    }

                    const downloadUrl = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = `${modelName}_${Date.now()}.png`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(downloadUrl);
                }, 'image/png');

            } catch (error) {
                console.error('下载失败:', error);
                // 如果处理失败，尝试直接下载原图
                try {
                    const response = await fetch(url);
                    const blob = await response.blob();
                    const downloadUrl = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = `${modelName}_${Date.now()}.png`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(downloadUrl);
                } catch (fallbackError) {
                    alert('⚠️ 下载失败，请右键保存图片');
                }
            }
        }

        /**
         * 生成图片缩略图（小尺寸，用于历史记录显示）
         */
        async function generateThumbnail(imageUrl, maxSize = 150) {
            if (!imageUrl) return null;
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';

                img.onload = () => {
                    try {
                        let width = img.width;
                        let height = img.height;
                        if (!width || !height) { resolve(null); return; }
                        const ratio = Math.min(maxSize / width, maxSize / height);
                        width = Math.floor(width * ratio);
                        height = Math.floor(height * ratio);

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);

                        // WebP：比 JPEG 省 40-60% 空间
                        resolve(canvas.toDataURL('image/webp', 0.7));
                    } catch (e) {
                        resolve(null);
                    }
                };

                img.onerror = () => resolve(null);
                img.src = imageUrl;
            });
        }

        /**
         * 将代码内容转换为图片（完整首屏截图）
         */
        async function codeToImage(codeContent, platform = 'mobile') {
            return new Promise((resolve, reject) => {
                try {
                    // 根据平台设置尺寸
                    let targetWidth, targetHeight;
                    if (platform === 'mobile') {
                        targetWidth = 375;
                        targetHeight = 812; // iPhone标准高度
                    } else {
                        targetWidth = 1920;
                        targetHeight = 1080; // 桌面标准高度
                    }

                    // 创建一个隐藏的iframe来渲染代码
                    const iframe = document.createElement('iframe');
                    iframe.style.position = 'fixed';
                    iframe.style.left = '-9999px';
                    iframe.style.top = '-9999px';
                    iframe.style.width = targetWidth + 'px';
                    iframe.style.height = targetHeight + 'px';
                    iframe.style.border = 'none';
                    iframe.style.backgroundColor = '#ffffff';
                    iframe.setAttribute('scrolling', 'no');

                    // 确保iframe的尺寸属性也设置
                    iframe.width = targetWidth;
                    iframe.height = targetHeight;

                    iframe.srcdoc = injectChartShim(codeContent);

                    document.body.appendChild(iframe);

                    let isResolved = false;
                    let timeoutId;

                    // 清理函数
                    const cleanup = () => {
                        if (timeoutId) clearTimeout(timeoutId);
                        if (document.body.contains(iframe)) {
                            document.body.removeChild(iframe);
                        }
                    };

                    // 等待iframe加载完成
                    iframe.onload = () => {
                        // 等待内容渲染和图片加载
                        setTimeout(async () => {
                            try {
                                if (isResolved) return;

                                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;

                                if (!iframeDoc) {
                                    if (!isResolved) {
                                        isResolved = true;
                                        cleanup();
                                        reject(new Error('无法访问iframe文档'));
                                    }
                                    return;
                                }

                                // 等待所有图片加载完成
                                const images = iframeDoc.querySelectorAll('img');
                                const imagePromises = Array.from(images).map(img => {
                                    if (img.complete) return Promise.resolve();
                                    return new Promise((resolve, reject) => {
                                        img.onload = resolve;
                                        img.onerror = resolve; // 即使加载失败也继续
                                        setTimeout(resolve, 5000); // 增加到5秒超时（复杂页面图片可能较多）
                                    });
                                });

                                await Promise.all(imagePromises);

                                // 再等待一下确保渲染完成（增加等待时间）
                                await new Promise(resolve => setTimeout(resolve, 1000));

                                if (isResolved) return;

                                // 使用html2canvas截图
                                if (typeof html2canvas !== 'undefined') {
                                    // 使用documentElement确保捕获整个页面
                                    const elementToCapture = iframeDoc.documentElement;

                                    if (!elementToCapture) {
                                        if (!isResolved) {
                                            isResolved = true;
                                            cleanup();
                                            reject(new Error('无法访问documentElement'));
                                        }
                                        return;
                                    }

                                    try {
                                        const canvas = await html2canvas(elementToCapture, {
                                            scale: 1,
                                            useCORS: true,
                                            allowTaint: true,
                                            backgroundColor: null, // 使用原始背景
                                            logging: false,
                                            width: targetWidth,
                                            height: targetHeight,
                                            windowWidth: targetWidth,
                                            windowHeight: targetHeight,
                                            x: 0,
                                            y: 0
                                        });

                                        // 确保canvas尺寸正确
                                        const finalCanvas = document.createElement('canvas');
                                        finalCanvas.width = targetWidth;
                                        finalCanvas.height = targetHeight;
                                        const ctx = finalCanvas.getContext('2d');

                                        // 绘制到正确尺寸的canvas
                                        ctx.drawImage(canvas, 0, 0, targetWidth, targetHeight);

                                        const imageData = finalCanvas.toDataURL('image/png', 1.0);

                                        if (!isResolved) {
                                            isResolved = true;
                                            cleanup();
                                            resolve(imageData);
                                        }
                                    } catch (html2canvasError) {
                                        console.error('html2canvas错误:', html2canvasError);
                                        if (!isResolved) {
                                            isResolved = true;
                                            cleanup();
                                            reject(html2canvasError);
                                        }
                                    }
                                } else {
                                    // 如果没有html2canvas，生成占位图
                                    const canvas = document.createElement('canvas');
                                    canvas.width = targetWidth;
                                    canvas.height = targetHeight;
                                    const ctx = canvas.getContext('2d');
                                    ctx.fillStyle = '#f3f4f6';
                                    ctx.fillRect(0, 0, targetWidth, targetHeight);
                                    ctx.fillStyle = '#9ca3af';
                                    ctx.font = '24px Arial';
                                    ctx.textAlign = 'center';
                                    ctx.textBaseline = 'middle';
                                    ctx.fillText('代码预览', targetWidth / 2, targetHeight / 2);

                                    const imageData = canvas.toDataURL('image/png', 1.0);
                                    if (!isResolved) {
                                        isResolved = true;
                                        cleanup();
                                        resolve(imageData);
                                    }
                                }
                            } catch (error) {
                                console.error('代码转图片失败:', error);
                                if (!isResolved) {
                                    isResolved = true;
                                    cleanup();
                                    reject(error);
                                }
                            }
                        }, 1000); // 初始等待1秒
                    };

                    // 如果iframe加载失败
                    iframe.onerror = () => {
                        if (!isResolved) {
                            isResolved = true;
                            cleanup();
                            reject(new Error('iframe加载失败'));
                        }
                    };

                    // 设置超时（增加到40秒，因为复杂的HTML代码需要更多时间渲染和截图）
                    timeoutId = setTimeout(() => {
                        if (!isResolved) {
                            isResolved = true;
                            cleanup();
                            reject(new Error('代码转图片超时（40秒）'));
                        }
                    }, 40000); // 40秒超时
                } catch (error) {
                    console.error('代码转图片失败:', error);
                    reject(error);
                }
            });
        }

        /**
         * 复制长图到剪贴板（使用服务端 Puppeteer）

        async function takeServerScreenshot(codeContent, platform = 'mobile') {

                method: 'POST',
                headers: { 'Content-Type': 'application/json' },

                    width: targetWidth,
                    scale: 2
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.message || '截图服务失败');
            }

            const { dataUrl, height } = await response.json();
            console.log('Screenshot generated:', { height, width: targetWidth });
            return dataUrl;
        }

        /**
          * 为代码内容生成缩略图（通过iframe渲染后截图）

         */
        async function generateCodeThumbnail(codeContent, maxSize = 150, platform = 'mobile') {
            return new Promise(async (resolve) => {
                try {
                    // 使用codeToImage生成完整图片
                    const fullImage = await codeToImage(codeContent, platform);

                    if (!fullImage) {
                        resolve(null);
                        return;
                    }

                    // 创建图片对象并缩放为缩略图
                    const img = new Image();
                    img.onload = () => {
                        try {
                            // 计算缩略图尺寸（保持宽高比）
                            let width = img.width;
                            let height = img.height;
                            const ratio = Math.min(maxSize / width, maxSize / height);
                            width = Math.floor(width * ratio);
                            height = Math.floor(height * ratio);

                            // 创建 Canvas 并绘制缩略图
                            const canvas = document.createElement('canvas');
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);

                            // 转换为 base64（质量降低以减小文件大小）
                            const thumbnail = canvas.toDataURL('image/jpeg', 0.7);
                            resolve(thumbnail);
                        } catch (error) {
                            console.error('生成缩略图失败:', error);
                            resolve(null);
                        }
                    };

                    img.onerror = () => {
                        resolve(null);
                    };

                    img.src = fullImage;
                } catch (error) {
                    console.error('生成代码缩略图失败:', error);
                    resolve(null);
                }
            });
        }

        // 历史记录相关函数
        async function saveGenerationHistory(prompt, platform, selectedModels, results) {
            try {
                const existingHistory = JSON.parse(localStorage.getItem('generation_history') || '[]');
                const historyId = Date.now();

                // 处理每个结果：生成缩略图 + 存完整图到 IndexedDB
                const processedResults = await Promise.all(results.map(async (r) => {
                    const result = {
                        modelName: r.modelName,
                        cost: r.cost,
                        isError: r.isError,
                        errorMsg: r.errorMsg,
                        thumbnail: null,
                        // imageUrl 和 codeContent 都不存 localStorage（太大）
                        // 匹配到 IndexedDB key: historyId_modelName / historyId_modelName_code
                    };

                    if (!r.isError && r.imageUrl) {
                        // 图片型：完整 base64 存 IndexedDB，WebP 缩略图存 localStorage
                        saveImageToDB(`${historyId}_${r.modelName}`, r.imageUrl);
                        result.thumbnail = await generateThumbnail(r.imageUrl, 120);
                    }

                    if (!r.isError && r.codeContent) {
                        // 代码型：完整 HTML 存 IndexedDB，thumbnail = null（历史卡片异步加载 iframe）
                        saveImageToDB(`${historyId}_${r.modelName}_code`, r.codeContent);
                    }

                    return result;
                }));

                const historyItem = {
                    id: historyId,
                    timestamp: new Date().toISOString(),
                    prompt: prompt,
                    platform: platform,
                    platformText: platform === 'mobile' ? '手机端' : 'PC端',
                    selectedModels: selectedModels,
                    results: processedResults,
                    totalCost: results.reduce((sum, r) => sum + (r.cost || 0), 0)
                };

                console.log('🔵 创建历史记录项:', {
                    id: historyItem.id,
                    resultsCount: historyItem.results.length,
                    results: historyItem.results.map(r => r.modelName)
                });

                // 添加到历史记录数组的开头（最新的在前面）
                existingHistory.unshift(historyItem);

                // 限制历史记录数量（最多保存50条）
                const finalHistory = existingHistory.length > 50
                    ? existingHistory.slice(0, 50)
                    : existingHistory;

                // 更新全局变量
                generationHistory = finalHistory;

                // 保存到 localStorage（带配额溢出保护）
                let saved = false;
                for (let trimCount = 0; trimCount <= finalHistory.length; trimCount++) {
                    try {
                        const toSave = trimCount === 0 ? finalHistory : finalHistory.slice(0, Math.max(1, finalHistory.length - trimCount));
                        localStorage.setItem('generation_history', JSON.stringify(toSave));
                        generationHistory = toSave;
                        if (trimCount > 0) console.warn(`⚠️ localStorage 空间不足，已裁剪至 ${toSave.length} 条记录`);
                        saved = true;
                        break;
                    } catch (e) {
                        if (e.name === 'QuotaExceededError' || e.code === 22) {
                            // 继续循环，减少条目再试
                            continue;
                        }
                        throw e;
                    }
                }
                if (!saved) console.error('❌ 无法保存历史记录：localStorage 已满');

                // 保存到服务器（全站统计）
                try {
                    const totalCost = results.reduce((sum, r) => sum + (r.cost || 0), 0);
                    await fetch('/api/stats', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            results: results.map(r => ({
                                modelName: r.modelName,
                                cost: r.cost || 0,
                                isError: r.isError || false
                            })),
                            totalCost: totalCost
                        })
                    });
                    console.log('✅ 全站统计数据已保存到服务器');
                } catch (error) {
                    console.error('⚠️ 保存全站统计数据失败（不影响本地使用）:', error);
                }
            } catch (error) {
                console.error('❌ 保存历史记录失败:', error);
                console.error('错误堆栈:', error.stack);
                console.error('错误详情:', {
                    promptLength: prompt.length,
                    platform: platform,
                    resultsCount: results.length,
                    errorMessage: error.message
                });
                // 尝试保存简化版本（不生成缩略图）
                try {
                    const existingHistory = JSON.parse(localStorage.getItem('generation_history') || '[]');
                    const simplifiedHistoryItem = {
                        id: Date.now(),
                        timestamp: new Date().toISOString(),
                        prompt: prompt,
                        platform: platform,
                        platformText: platform === 'mobile' ? '手机端' : 'PC端',
                        selectedModels: selectedModels,
                        results: results.map(r => ({
                            modelName: r.modelName,
                            cost: r.cost || 0,
                            isError: r.isError || false,
                            errorMsg: r.errorMsg || '',
                            thumbnail: null,
                            imageUrl: r.imageUrl || null,
                            codeContent: r.codeContent || null
                        })),
                        totalCost: results.reduce((sum, r) => sum + (r.cost || 0), 0)
                    };
                    existingHistory.unshift(simplifiedHistoryItem);
                    const finalHistory = existingHistory.length > 50 ? existingHistory.slice(0, 50) : existingHistory;
                    generationHistory = finalHistory;
                    localStorage.setItem('generation_history', JSON.stringify(finalHistory));
                    console.log('✅ 已保存简化版历史记录（无缩略图）');
                } catch (fallbackError) {
                    console.error('❌ 保存简化版历史记录也失败:', fallbackError);
                }
            }
        }

        function filterHistory() {
            const historyList = document.getElementById('historyList');
            const historyEmpty = document.getElementById('historyEmpty');
            const historyNoResults = document.getElementById('historyNoResults');
            const historyCount = document.getElementById('historyCount');

            const searchText = (document.getElementById('historySearch')?.value || '').toLowerCase();
            const filterValue = document.getElementById('historyFilter')?.value || 'all';

            // 筛选历史记录
            filteredHistory = generationHistory.filter(item => {
                // 搜索筛选
                if (searchText) {
                    const promptMatch = item.prompt.toLowerCase().includes(searchText);
                    const modelMatch = item.selectedModels.some(key => {
                        const config = MODEL_CONFIGS[key];
                        return config && config.name.toLowerCase().includes(searchText);
                    });
                    if (!promptMatch && !modelMatch) return false;
                }

                // 平台筛选
                if (filterValue === 'mobile' && item.platform !== 'mobile') return false;
                if (filterValue === 'desktop' && item.platform !== 'desktop') return false;

                // 时间筛选
                if (filterValue === 'today' || filterValue === 'week' || filterValue === 'month') {
                    const itemDate = new Date(item.timestamp);
                    const now = new Date();
                    const diffTime = now - itemDate;
                    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

                    if (filterValue === 'today' && diffDays > 0) return false;
                    if (filterValue === 'week' && diffDays > 7) return false;
                    if (filterValue === 'month' && diffDays > 30) return false;
                }

                return true;
            });

            // 更新计数

                historyCount.textContent = filteredHistory.length;

                    <div class="flex items-start justify-between mb-3">

                            <div class="text-stone-500 text-xs flex flex-wrap gap-x-3 gap-y-1">
                                <span class="flex items-center gap-1">${item.platform === 'mobile' ? '<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>' : '<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>'} ${item.platformText}</span>

                        </div>
                    </div>
                    <div class="flex gap-2 flex-wrap" id="history-thumbnails-${item.id}">
                        ${item.results.slice(0, 4).map((r, idx) => {

        /**
         * 自适应小数位数的花费格式化
         * < $0.001  → 6 位小数
         * < $0.01   → 4 位小数
         * < $1      → 3 位小数
         * ≥ $1      → 2 位小数
         */
        function formatCost(value) {
            if (value === 0) return '$0.00';
            if (value < 0.001) return `$${value.toFixed(6)}`;
            if (value < 0.01) return `$${value.toFixed(4)}`;
            if (value < 1) return `$${value.toFixed(3)}`;
            return `$${value.toFixed(2)}`;
        }

        function updateCostStatistics(historyItems) {
            const costStatsEl = document.getElementById('costStatistics');
            const costStatsSummaryEl = document.getElementById('costStatsSummary');
            const costStatsDetailsEl = document.getElementById('costStatsDetails');

            if (!costStatsEl || !costStatsSummaryEl || !costStatsDetailsEl) return;

            // 优先使用服务器统计数据（全站统计）
            const serverStats = window.serverStatistics;

            let sortedStats = [];
            let grandTotal = 0;
            let totalGenerations = 0;
            let grandAverage = 0;
            let isServerStats = false;

            if (serverStats && serverStats.modelStats && serverStats.modelStats.length > 0) {
                // 使用服务器统计数据（全站）
                sortedStats = serverStats.modelStats;
                grandTotal = serverStats.grandTotal || 0;
                totalGenerations = serverStats.totalGenerations || 0;
                grandAverage = serverStats.grandAverage || 0;
                isServerStats = true;
            } else if (historyItems.length > 0) {
                // 使用本地历史记录统计
                const modelStats = {};

                historyItems.forEach(item => {
                    if (!item.results || !Array.isArray(item.results)) return;

                    item.results.forEach(result => {
                        if (!result.modelName) return;
                        const cost = result.cost || 0;

                        if (!modelStats[result.modelName]) {
                            modelStats[result.modelName] = {
                                totalCost: 0,
                                count: 0
                            };
                        }

                        modelStats[result.modelName].totalCost += cost;
                        modelStats[result.modelName].count += 1;
                    });
                });

                sortedStats = Object.entries(modelStats)
                    .map(([modelName, stats]) => ({
                        modelName,
                        totalCost: stats.totalCost,
                        count: stats.count,
                        averageCost: stats.totalCost / stats.count
                    }))
                    .sort((a, b) => b.totalCost - a.totalCost);

                grandTotal = sortedStats.reduce((sum, stat) => sum + stat.totalCost, 0);
                totalGenerations = sortedStats.reduce((sum, stat) => sum + stat.count, 0);
                grandAverage = totalGenerations > 0 ? grandTotal / totalGenerations : 0;
            }

            if (sortedStats.length === 0) {
                costStatsEl.classList.add('hidden');
                return;
            }

            // 显示统计
            costStatsEl.classList.remove('hidden');

            // 默认显示的摘要（只显示平均每次）
            const statsLabel = isServerStats ? '平均每次' : '平均每次';
            costStatsSummaryEl.innerHTML = `
                <div class="flex items-center gap-2">
                    <span class="text-stone-400">${statsLabel}：</span>
                    <span class="text-xl font-bold text-amber-400 font-mono">${formatCost(grandAverage)}</span>
                    ${isServerStats ? '<span class="text-xs text-stone-400 ml-1">🌐 全站</span>' : ''}
                </div>
            `;

            // 详细内容（默认隐藏）
            const detailsTitle = isServerStats ? '按模型统计（全站）' : '按模型统计';
            let detailsHtml = `
                ${isServerStats ? '<div class="text-stone-400 text-xs font-medium mb-2">🌐 全站统计数据</div>' : ''}
                <div class="grid grid-cols-3 gap-4 mb-3 pb-3 border-b border-stone-600/50">
                    <div class="text-center">
                        <div class="text-stone-400 text-xs">${isServerStats ? '全站总花费' : '总花费'}</div>
                        <div class="text-lg font-bold text-amber-400 font-mono">${formatCost(grandTotal)}</div>
                    </div>
                    <div class="text-center">
                        <div class="text-stone-400 text-xs">${isServerStats ? '全站生成次数' : '总生成次数'}</div>
                        <div class="text-lg font-bold text-stone-100">${totalGenerations}</div>
                    </div>
                    <div class="text-center">
                        <div class="text-stone-400 text-xs">平均每次</div>
                        <div class="text-lg font-bold text-amber-400 font-mono">${formatCost(grandAverage)}</div>
                    </div>
                </div>
                <div class="space-y-2">
                    <div class="text-stone-300 font-semibold text-xs mb-2">${detailsTitle}：</div>
            `;

            sortedStats.forEach(stat => {
                detailsHtml += `
                    <div class="flex items-center justify-between py-2 px-3 bg-stone-700/40 rounded-lg">
                        <div class="flex-1">
                            <div class="text-stone-100 font-medium text-sm">${stat.modelName}</div>
                            <div class="text-stone-400 text-xs mt-0.5">生成 ${stat.count} 次</div>
                        </div>
                        <div class="text-right">
                            <div class="text-amber-400 font-bold text-sm font-mono">${formatCost(stat.totalCost)}</div>
                            <div class="text-stone-400 text-xs font-mono">平均 ${formatCost(stat.averageCost)}</div>
                        </div>
                    </div>
                `;
            });

            detailsHtml += `</div>`;
            costStatsDetailsEl.innerHTML = detailsHtml;

            // 确保详细内容默认隐藏
            costStatsDetailsEl.classList.add('hidden');

            // 更新按钮文本
            const toggleBtnText = document.getElementById('toggleCostStatsText');
            if (toggleBtnText) {
                toggleBtnText.textContent = '展开';
            }
        }

        function toggleCostStatistics() {
            const costStatsDetailsEl = document.getElementById('costStatsDetails');
            const toggleBtnText = document.getElementById('toggleCostStatsText');

            if (!costStatsDetailsEl || !toggleBtnText) return;

            const isHidden = costStatsDetailsEl.classList.contains('hidden');
            if (isHidden) {
                costStatsDetailsEl.classList.remove('hidden');
                toggleBtnText.textContent = '收起';
            } else {
                costStatsDetailsEl.classList.add('hidden');
                toggleBtnText.textContent = '展开';
            }
        }

        async function viewHistoryItem(historyId) {
            const item = generationHistory.find(h => h.id === historyId) || filteredHistory.find(h => h.id === historyId);
            if (!item) {
                alert('历史记录不存在');
                return;
            }

            // 清空当前结果
            currentResults = [];
            document.getElementById('resultsGrid').innerHTML = '';

            // 加载历史结果 - 从 IndexedDB 加载图片数据
            for (const result of item.results) {
                if (result.isError) {
                    // 错误结果
                    addResultCard(result.modelName, '', result.cost, true, result.errorMsg, null);
                } else {
                    // 尝试从 IndexedDB 加载图片
                    const imageKey = `${item.id}_${result.modelName}`;
                    const codeKey = `${item.id}_${result.modelName}_code`;
                    const imageUrl = await getImageFromDB(imageKey);
                    const codeContent = await getImageFromDB(codeKey);

                    if (imageUrl) {
                        // 有图片，正常显示
                        addResultCard(result.modelName, imageUrl, result.cost, false, '', codeContent);
                    } else if (codeContent) {
                        // 只有代码内容，显示代码预览
                        addResultCard(result.modelName, '', result.cost, false, '', codeContent);
                    } else {
                        // 没有图片也没有代码，显示提示
                        const card = document.createElement('div');
                        card.className = 'image-card glass-dark rounded-2xl overflow-hidden';
                        card.innerHTML = `
                            <div class="aspect-square bg-blue-50 flex items-center justify-center p-6">
                                <div class="text-center">
                                    <div class="text-4xl mb-2">📷</div>
                                    <div class="text-blue-600 text-sm font-medium mb-2">图片数据未保存</div>
                                    <div class="text-gray-600 text-xs mb-3">历史记录中不包含图片数据</div>
                                    <button class="glass text-blue-600 font-medium text-sm px-4 py-2 rounded-lg hover:bg-white/30 transition">
                                        🔄 重新生成
                                    </button>
                                </div>
                            </div>
                            <div class="p-4">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-gray-800 font-semibold">${result.modelName}</span>
                                </div>
                            </div>
                        `;
                        card.querySelector('button').onclick = () => {
                            closeHistory();
                            regenerateFromHistory(historyId);
                        };
                        document.getElementById('resultsGrid').appendChild(card);
                    }
                }
            }

            // 填充输入框
            document.getElementById('promptInput').value = item.prompt;
            updateCharCount();

            // 设置平台选择
            const platformRadio = document.querySelector(`input[name="platform"][value="${item.platform}"]`);
            if (platformRadio) {
                platformRadio.checked = true;
            }

            // 设置模型选择
            Object.keys(MODEL_CONFIGS).forEach(key => {
                const checkbox = document.getElementById(`model-${key}`);
                if (checkbox) {
                    checkbox.checked = item.selectedModels.includes(key);
                }
            });

            updateCostEstimate();

            // 关闭历史记录模态框
            closeHistory();

            // 滚动到结果区域
            document.getElementById('resultsGrid').scrollIntoView({ behavior: 'smooth' });
        }

        function regenerateFromHistory(historyId) {
            const item = generationHistory.find(h => h.id === historyId) || filteredHistory.find(h => h.id === historyId);
            if (!item) {
                alert('历史记录不存在');
                return;
            }

            // 填充输入框
            document.getElementById('promptInput').value = item.prompt;
            updateCharCount();

            // 设置平台选择
            const platformRadio = document.querySelector(`input[name="platform"][value="${item.platform}"]`);
            if (platformRadio) {
                platformRadio.checked = true;
            }

            // 设置模型选择
            Object.keys(MODEL_CONFIGS).forEach(key => {
                const checkbox = document.getElementById(`model-${key}`);
                if (checkbox) {
                    checkbox.checked = item.selectedModels.includes(key);
                }
            });

            updateCostEstimate();

            // 关闭历史记录模态框
            closeHistory();

            // 开始生成
            startGeneration();
        }

        function deleteHistoryItem(historyId) {
            if (!confirm('确定要删除这条历史记录吗？')) return;
            deleteHistoryImagesFromDB(historyId); // 同步清理 IndexedDB
            generationHistory = generationHistory.filter(h => h.id !== historyId);
            localStorage.setItem('generation_history', JSON.stringify(generationHistory));
            loadHistory();
        }

        function clearAllHistory() {
            if (!confirm('确定要清空所有历史记录吗？此操作不可恢复！')) return;
            // 清空 IndexedDB中所有图片
            initImageDB().then(db => {
                if (!db) return;
                db.transaction(IMAGE_STORE, 'readwrite').objectStore(IMAGE_STORE).clear();
            });
            generationHistory = [];
            localStorage.setItem('generation_history', JSON.stringify(generationHistory));
            loadHistory();
        }

        // 显示提示消息
        function showToast(message, duration = 2000) {
            // 移除已有的 toast，避免叠加
            document.querySelectorAll('.app-toast').forEach(t => t.remove());

            // 创建 toast 元素
            const toast = document.createElement('div');
            toast.className = 'app-toast fixed z-[9999] transition-all opacity-0';
            toast.style.cssText = `
                top: 50%;
                left: 50%;
                transform: translate(-50%, calc(-50% + 12px));
                background: rgba(28,25,23,0.95);
                border: 1px solid rgba(245,158,11,0.35);
                color: #fafaf9;
                padding: 14px 28px;
                border-radius: 16px;
                font-size: 15px;
                font-weight: 600;
                box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(245,158,11,0.15);
                white-space: nowrap;
                pointer-events: none;
                backdrop-filter: blur(12px);
                letter-spacing: 0.01em;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);

            // 显示动画
            setTimeout(() => {
                toast.style.opacity = '1';
                toast.style.transform = 'translate(-50%, -50%)';
            }, 10);

            // 自动移除
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, calc(-50% - 8px))';
                setTimeout(() => {
                    if (document.body.contains(toast)) {
                        document.body.removeChild(toast);
                    }
                }, 300);
            }, duration);
        }

        // HTML 转义函数
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 显示代码预览大图（全屏预览）
        function showCodePreview(codeContent, modelName, platform = 'mobile') {
            const handleEsc = (e) => {
                if (e.key === 'Escape') { modal.remove(); document.removeEventListener('keydown', handleEsc); }
            };

            // 全屏蒙层
            const modal = document.createElement('div');
            modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;';
            modal.addEventListener('click', (e) => { if (e.target === modal) { modal.remove(); document.removeEventListener('keydown', handleEsc); } });

            // 主题判断提前
            const isDark = document.documentElement.classList.contains('dark');

            // 内容区：左右布局
            const wrap = document.createElement('div');
            wrap.style.cssText = 'display:flex;flex-direction:row;gap:16px;height:95vh;align-items:stretch;width:92vw;max-width:1400px;';

            // ── 左：iframe 区 ──
            const iframeCol = document.createElement('div');
            iframeCol.style.cssText = `flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;border-radius:16px;background:${isDark ? '#0c0a09' : '#f5f3ee'};border:1px solid ${isDark ? 'transparent' : '#e7e5df'};`;

            const iframeWrap = document.createElement('div');
            iframeWrap.style.cssText = 'flex:1;overflow:auto;height:100%;border-radius:16px;display:flex;justify-content:center;align-items:flex-start;scrollbar-gutter:stable;';
            iframeWrap.classList.add(isDark ? 'scrollbar-dark' : 'scrollbar-light');

            const iframe = document.createElement('iframe');
            if (platform === 'mobile') {
                iframe.style.cssText = 'border:none;display:block;width:390px;min-width:390px;height:100%;min-height:667px;';
            } else {
                iframe.style.cssText = 'border:none;display:block;width:100%;height:100%;min-height:500px;';
            }
            iframe.srcdoc = injectChartShim(codeContent);
            iframeWrap.appendChild(iframe);
            iframeCol.appendChild(iframeWrap);

            // ── 右：说明区（统一卡片结构，与图片预览一致） ──
            const side = document.createElement('div');
            side.id = 'codePreviewRightPanel';
            side.style.cssText = `flex:1;min-width:0;display:flex;flex-direction:column;border-radius:16px;overflow:hidden;border:1px solid ${isDark ? 'rgba(255,255,255,0.07)' : '#e7e5df'};background:${isDark ? '#1c1917' : '#ffffff'};`;

            // 顶部栏：标题 + 关闭
            const topBar = document.createElement('div');
            topBar.style.cssText = `display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding:16px 20px;border-bottom:1px solid ${isDark ? 'rgba(255,255,255,0.07)' : '#e7e5df'};`;

            const titleLabel = document.createElement('span');
            titleLabel.style.cssText = `color:${isDark ? '#fafaf9' : '#1c1917'};font-weight:700;font-size:15px;`;
            titleLabel.textContent = '图片详情';

            const closeBtn = document.createElement('button');
            closeBtn.style.cssText = `width:32px;height:32px;border-radius:8px;background:${isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.04)'};border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:${isDark ? '#a8a29e' : '#57534e'};transition:background 0.15s;flex-shrink:0;`;
            closeBtn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>`;
            closeBtn.onmouseenter = () => closeBtn.style.background = isDark ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.08)';
            closeBtn.onmouseleave = () => closeBtn.style.background = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.04)';
            closeBtn.onclick = () => { modal.remove(); document.removeEventListener('keydown', handleEsc); };

            topBar.appendChild(titleLabel);
            topBar.appendChild(closeBtn);

            // 内容区（可滚动）
            const descPanel = document.createElement('div');
            descPanel.id = 'codeModalInfoPanel';
            descPanel.style.cssText = `flex:1;min-height:0;overflow-y:auto;padding:16px 20px;scrollbar-gutter:stable;background:${isDark ? '#1c1917' : '#ffffff'};`;
            descPanel.classList.add('scrollbar-dark');

            const cardBg = isDark ? 'rgba(255,255,255,0.04)' : '#f8f6f1';
            const labelColor = isDark ? '#78716c' : '#78716c';
            const valueColor = isDark ? '#e7e5e4' : '#1c1917';

            descPanel.innerHTML = `
                <div style="display:flex;flex-direction:column;gap:10px;">
                    <div style="background:${cardBg};border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border:1px solid ${isDark ? 'transparent' : '#e7e5df'};">
                        <span style="color:${labelColor};font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;">模型</span>
                        <span style="color:${valueColor};font-size:13px;font-weight:600;">${modelName || '—'}</span>
                    </div>
                    <div style="background:${cardBg};border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border:1px solid ${isDark ? 'transparent' : '#e7e5df'};">
                        <span style="color:${labelColor};font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;">输出类型</span>
                        <span style="color:${valueColor};font-size:13px;font-weight:600;">代码预览</span>
                    </div>
                </div>
                <div style="margin-top:12px;">${buildCodeAnalysisHtml(codeContent, isDark)}</div>
            `;

            // 底部按钮
            const btns = document.createElement('div');
            btns.style.cssText = `display:flex;flex-direction:row;gap:8px;flex-shrink:0;padding:16px 20px;border-top:1px solid ${isDark ? 'rgba(255,255,255,0.07)' : '#e7e5df'};`;

            const copyBtn = document.createElement('button');
            copyBtn.style.cssText = `flex:1;background:linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);border:none;color:#1c1917;font-weight:600;font-size:13px;padding:13px 0;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.15s;`;
            copyBtn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>复制图片`;
            copyBtn.onmouseenter = () => copyBtn.style.background = 'linear-gradient(135deg, #fcd34d 0%, #fbbf24 100%)';
            copyBtn.onmouseleave = () => copyBtn.style.background = 'linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%)';

            const dlBtn = document.createElement('button');
            dlBtn.style.cssText = `flex:1;background:${isDark ? '#292524' : '#f3f1eb'};border:1px solid ${isDark ? 'rgba(255,255,255,0.08)' : '#e7e5df'};color:${isDark ? '#e7e5e4' : '#1c1917'};font-weight:600;font-size:13px;padding:13px 0;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background 0.15s;`;
            dlBtn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>下载图片`;
            dlBtn.onmouseenter = () => dlBtn.style.background = isDark ? '#44403c' : '#e7e5df';
            dlBtn.onmouseleave = () => dlBtn.style.background = isDark ? '#292524' : '#f3f1eb';

            // 使用全局缓存（卡片和弹窗共享）
            copyBtn.onclick = async () => {
                copyBtn.disabled = true;
                dlBtn.disabled = true;
                const origInner = copyBtn.innerHTML;
                copyBtn.innerHTML = '<div class="spinner" style="width:14px;height:14px;border:2px solid rgba(0,0,0,0.2);border-top-color:#1c1917;border-radius:50%;animation:spin 0.6s linear infinite;display:inline-block;"></div>';
                try {
                    const dataUrl = await getOrCreateGlobalScreenshot(codeContent, platform);
                    const res = await fetch(dataUrl);
                    const blob = await res.blob();
                    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
                    showToast('✅ 图片已复制到剪贴板', 2000);
                } catch (err) {
                    console.error('复制失败:', err);
                    showToast('❌ 复制失败，请重试', 2000);
                } finally {
                    copyBtn.disabled = false;
                    dlBtn.disabled = false;
                    copyBtn.innerHTML = origInner;
                }
            };

            dlBtn.onclick = async () => {
                dlBtn.disabled = true;
                copyBtn.disabled = true;
                const origInner = dlBtn.innerHTML;
                dlBtn.innerHTML = '<div class="spinner" style="width:14px;height:14px;border:2px solid rgba(255,255,255,0.2);border-top-color:#e7e5e4;border-radius:50%;animation:spin 0.6s linear infinite;display:inline-block;"></div>';
                try {
                    const dataUrl = await getOrCreateGlobalScreenshot(codeContent, platform);
                    const a = document.createElement('a');
                    a.href = dataUrl;
                    a.download = `${modelName || 'ui-design'}-${Date.now()}.png`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    showToast('✅ 图片已下载', 2000);
                } catch (err) {
                    console.error('下载失败:', err);
                    showToast('❌ 下载失败，请重试', 2000);
                } finally {
                    dlBtn.disabled = false;
                    copyBtn.disabled = false;
                    dlBtn.innerHTML = origInner;
                }
            };

            btns.appendChild(copyBtn);
            btns.appendChild(dlBtn);
            side.appendChild(topBar);
            side.appendChild(descPanel);
            side.appendChild(btns);

            wrap.appendChild(iframeCol);
            wrap.appendChild(side);
            modal.appendChild(wrap);
            document.body.appendChild(modal);
            document.addEventListener('keydown', handleEsc);
        }
    </script>
</body>

</html>
